<!doctype html>
<html>
<head>
    <title>Chat With PDF</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <style>
        @media (max-width: 768px) {

            .chat-header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .user-message {
                max-width: 90% !important;
            }

            .ai-message {
                max-width: 95% !important;
            }

            .input-group {
                flex-direction: column;
            }

            .input-group .form-control {
                margin-bottom: 10px;
                border-radius: 8px !important;
            }

            .input-group .btn {
                width: 100%;
                border-radius: 8px !important;
            }

            .chat-title {
                font-size: 1.8rem;
            }

            .chat-subtitle {
                font-size: 0.95rem;
            }

            #chatLoading h3 {
                font-size: 1.2rem;
                text-align: center;
                padding: 0 20px;
            }

            .action-buttons {
                text-align: center;
            }
        }
    </style>
</head>

<script>
window.onload = function() {
    window.scrollTo(
        0,
        document.body.scrollHeight
    );
};
</script>

<body style="background:#f4f7fb; min-height:100vh; overflow-x:hidden; ">

    <div class="container py-4">

        <!-- Header -->
       <div class="d-flex justify-content-between align-items-center mb-4 chat-header">

            <div>
                <h1 class="fw-bold mb-0 chat-title">
                    🤖 Chat With PDF
                </h1>

                <p class="text-muted mb-0 chat-subtitle">
                    Ask questions about your uploaded document
                </p>
            </div>

            <a href="/"
            class="btn btn-outline-primary">
                📄 New PDF
            </a>

        </div>

        <!-- Chat Messages -->
        <div class="card shadow">

            <div class="card-body">

                {% for chat in chat_history %}

                <!-- User Message -->
                <div class="d-flex justify-content-end mb-3">

                    <div
                        class="card bg-primary text-white user-message"
                        style="
                        max-width:70%;
                        border-radius:20px;
                        ">

                        <div class="card-body">
                            {{ chat.question }}
                        </div>

                    </div>

                </div>

                <!-- AI Message -->
                <div class="d-flex justify-content-start mb-4">

                    <div
                        class="card shadow-sm ai-message"
                        style="
                        max-width:75%;
                        border-radius:20px;
                        ">

                        <div class="card-body">

                            <strong>
                                🤖 DocChat AI Assistant
                            </strong>

                            <hr>

                            {{ chat.answer }}

                        </div>

                    </div>

                </div>

                {% endfor %}

            </div>

        </div>

        <!-- Input Area -->
        <form id="chatForm"
            action="/ask"
            method="POST"
            class="bg-white p-3 shadow mt-3 rounded">

            <div class="input-group">

                <input
                    type="text"
                    name="question"
                    class="form-control"
                    placeholder="Ask anything about your PDF..."
                    required>

                <button class="btn btn-primary">
                    🚀 Send
                </button>

            </div>

            <!-- Space Added Here -->
            <div class="mt-3 action-buttons">

                <a href="/clear-chat"
                class="btn btn-outline-danger">
                    🗑️ Clear Chat
                </a>

            </div>

        </form>

    </div>
    <div
        id="chatLoading"
        style="
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.7);
        z-index:9999;
        ">

        <div
            class="d-flex flex-column justify-content-center align-items-center h-100 text-white">

            <div
                class="spinner-border"
                style="
                width:4rem;
                height:4rem;
                ">
            </div>

            <h3 class="mt-4">
                🤖 AI is thinking...
            </h3>

        </div>
    </div>
    <script>

        document
        .getElementById("chatForm")
        .addEventListener(
            "submit",
            function(){

                document
                .getElementById(
                    "chatLoading"
                )
                .style.display =
                "block";

            }
        );

    </script>
</body>
</html>
